camera:
  source: test_videos\mult_sample.mp4                  
  fps_limit: 30
  resolution: [1280, 720]

detection:
  model_path: models/best_ppe.pt
  data_yaml: dataset/data.yaml
  classes:
    ppe_present: ['Hardhat', 'Gloves', 'Goggles', 'Mask', 'Safety Vest']     
    ppe_violations: ['NO-Hardhat', 'NO-Gloves', 'NO-Goggles', 'NO-Mask', 'NO-Safety Vest']
    critical: ['Fall-Detected']
    environment: ['Safety Cone', 'Ladder']
    person: ['Person'] 
  confidence_threshold: 0.45
  iou_threshold: 0.5
  device: cuda     

pose:
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

posture:
  neck_angle_threshold: 20
  back_angle_threshold: 30
  knee_angle_threshold: 160

fall_detection:
  velocity_threshold: 0.35
  hip_knee_angle_threshold: 60

tracker:
  max_age: 30
  min_hits: 3
  minimum_matching_threshold: 0.5

zones:
  - id: zone_a
    name: "Heavy Machinery Area"
    required_ppe: [helmet, vest, gloves, goggles]
  - id: zone_b
    name: "General Floor"
    required_ppe: [helmet, vest]

alerts:
  language: en                 # en, hi, ta, te, bn
  cooldown_sec: 10
  critical_violations:
    - fall
    - Fall-Detected
    - NO-Hardhat

reporting:
  output_dir: reports/
  company_name: "Your Company Name"

database:
  pool_size: 5
  echo: false                  # true = print all SQL queries (useful for learning)